reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      The University of Bath has no commercial or openly documented production API
      program. Its verifiable machine-readable footprint is scholarly-metadata
      oriented: a live Elsevier Pure OAI-PMH endpoint (confirmed via Identify,
      Pure 5.33.3-3) and an EPrints 3.4 Research Data Archive offering OAI-PMH plus
      a REST/feeds interface. The library runs Ex Libris Alma/Primo (public Primo
      front end resolves; programmatic Primo APIs require an Ex Libris key). An
      Azure API Management developer portal exists but the only publicly reachable
      instance is a non-production "test" environment with no documented production
      APIs. Endpoints below were probed live; nothing was fabricated. The
      researchportal.bath.ac.uk Pure OAI path returned 500 and was excluded in
      favor of the working purehost.bath.ac.uk endpoint.
    endpoints:
      - url: https://purehost.bath.ac.uk/ws/oai?verb=Identify
        status: 200
        note: Valid OAI-PMH 2.0; "University of Bath Open Access Repository", Pure 5.33.3-3.
